name: Desktop-Build-Workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: 🚀 Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            output: build/windows/x64/runner/Release/*.exe
          - platform: macos
            os: macos-latest
            output: build/macos/Build/Products/Release/*.app
          - platform: linux
            os: ubuntu-latest
            output: build/linux/x64/release/bundle/*

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- Platform Specific Dependencies ---
      
      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      # --- Core Flutter Setup ---

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Enable Desktop Support
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter config --enable-windows-desktop

      # --- Build Process ---

      - name: Build Desktop App
        run: flutter build ${{ matrix.platform }} --release

      # --- Packaging & Artifacts ---

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.output }}

      - name: Release to GitHub
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.output }}
          file_glob: true
          tag: v1.0.${{ github.run_number }}
          overwrite: true
          body: "Automated Desktop Build for Bluetooth Chat (Run #${{ github.run_number }})"
