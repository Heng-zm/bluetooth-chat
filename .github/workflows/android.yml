name: Android-Production-Build

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  push:
    branches:
      - main # Automatically builds when you push to main

jobs:
  build:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Required for AGP 8.0+
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        # We keep the skip-validation flag just in case Kotlin isn't upgraded yet
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release --android-skip-build-dependency-validation

      - name: Create GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/app-release.apk
          asset_name: BluetoothChat-v${{ github.run_number }}.apk
          tag: v1.0.${{ github.run_number }}
          overwrite: true
          body: "Automated Build for Bluetooth Chat App (Run #${{ github.run_number }})"

      - name: Upload AAB to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/bundle/release/app-release.aab
          asset_name: BluetoothChat-v${{ github.run_number }}.aab
          tag: v1.0.${{ github.run_number }}
          overwrite: true
