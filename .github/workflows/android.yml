name: Android-Build-Workflow

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: 🤖 Android Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Ensure Assets Directory Exists
        # This fixes the "unable to find directory entry in pubspec.yaml" error
        run: mkdir -p assets

      - name: Build APK
        # Added --no-tree-shake-icons to avoid that warning/extra processing
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/app/outputs/flutter-apk/app-release.apk
          asset_name: BluetoothChat-${{ github.run_number }}.apk
          tag: v1.0.${{ github.run_number }}
          overwrite: true
