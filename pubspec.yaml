name: bluetooth_chat
description: Encrypted Bluetooth Chat App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^11.3.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  intl: ^0.19.0
  provider: ^6.1.2
  lottie: ^3.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/