# Lowered to 3GB to keep the GitHub runner stable
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
# Keep Jetifier true since flutter_bluetooth_serial is old
android.enableJetifier=true

# THESE TWO ARE KEY FOR OLDER PLUGINS:
# Forces the generation of the BuildConfig class which older plugins expect
android.defaults.buildfeatures.buildconfig=true
# Helps with resource R class issues in older libraries
android.nonTransitiveRClass=false
